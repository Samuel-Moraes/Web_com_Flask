<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Produto</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='generic.css') }}">
</head>
<body>
<div class="sidebar">
    <h2>Leaf Soft</h2>
    <ul>
        <li><a href="/">Home</a></li>
        <li class="has-submenu">
            <a href="#">Cadastro</a>
            <ul class="submenu">
                <li><a href="/cadastro/produto">Produto</a></li>
                <li><a href="/cadastro/cadastroPessoa">Cadastro</a></li>
            </ul>
        </li>
        <li class="has-submenu">
            <a href="#">Relatórios</a>
            <ul class="submenu">
                <li><a href="/relatorios/produtos">Produto</a></li>
            </ul>
    </ul>
</div>

    <div class="content">
        <div class="form-box">
            <h1>Cadastro de Produto</h1>
            <form method="post">
                <div class="input-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" value="{{ dados.get('nome','') }}" required>
                </div>

                <div class="input-group">
                    <label for="categoria">Categoria</label>
                    <select id="categoria" name="categoria" required>
                        <option value="">Selecione...</option>
                        <option value="alimento" {% if dados.get('categoria')=='alimento' %}selected{% endif %}>Alimento</option>
                        <option value="bebida" {% if dados.get('categoria')=='bebida' %}selected{% endif %}>Bebida</option>
                        <option value="higiene" {% if dados.get('categoria')=='higiene' %}selected{% endif %}>Higiene</option>
                        <option value="outros" {% if dados.get('categoria')=='outros' %}selected{% endif %}>Outros</option>
                    </select>
                </div>

                <div class="input-group">
                    <label for="preco_venda">Preço de Venda</label>
                    <input type="number" id="preco_venda" name="preco_venda" step="0.01" value="{{ dados.get('preco_venda','') }}" required>
                </div>

                <div class="input-group">
                    <label for="preco_custo">Preço de Custo</label>
                    <input type="number" id="preco_custo" name="preco_custo" step="0.01" value="{{ dados.get('preco_custo','') }}" required>
                </div>

                <div class="input-group">
                    <label for="pis_cofins">PIS/COFINS</label>
                    <input type="text" id="pis_cofins" name="pis_cofins" value="{{ dados.get('pis_cofins','') }}" required>
                </div>

                <div class="input-group">
                    <label for="cfop">CFOP</label>
                    <input type="text" id="cfop" name="cfop" value="{{ dados.get('cfop','') }}" required>
                </div>

                <button type="submit">Cadastrar Produto</button>
            </form>
        </div>
    </div>
</body>
</html>
