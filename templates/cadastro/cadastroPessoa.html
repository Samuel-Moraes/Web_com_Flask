<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='generic.css') }}">

</head>
<body>
<div class="sidebar">
    <h2>Leaf Soft</h2>
    <ul>
        <li><a href="/">Home</a></li>
        <li class="has-submenu">
            <a href="#">Cadastro</a>
            <ul class="submenu">
                <li><a href="/cadastro/produto">Produto</a></li>
                <li><a href="/cadastro/cadastroPessoa">Cadastro</a></li>
            </ul>
        </li>
        <li class="has-submenu">
            <a href="#">Relatórios</a>
            <ul class="submenu">
                <li><a href="/relatorios/produtos">Produto</a></li>
            </ul>
    </ul>
</div>

    <div class="content">
        <div class="form-box">
            <h1>Cadastro</h1>

            <!-- Exibe mensagem vinda do backend -->
            {% if mensagem %}
                <div class="toast">{{ mensagem }}</div>
            {% endif %}

            <form method="post">
                <div class="input-group">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{ dados.get('nome','') }}" required>
    </div>

    <div class="input-group">
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" name="cpf" value="{{ dados.get('cpf','') }}" required>
    </div>

    <div class="input-group">
        <label for="idade">Idade</label>
        <input type="number" id="idade" name="idade" value="{{ dados.get('idade','') }}" required>
    </div>

    <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" value="{{ dados.get('email','') }}" required>
    </div>

    <div class="input-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" value="{{ dados.get('senha','') }}" required>
    </div>

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</body>
</html>
